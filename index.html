<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TrustedPaws</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Tangerine"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-3" href="#">
          <span class="fw-bold"
            >Trusted<span class="text-primary">Paws</span></span
          >
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-center"
          id="navMenu"
        >
          <ul class="navbar-nav gap-lg-4">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">collection</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">All Pets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>
        </div>

        <div class="d-none d-lg-block">
          <a href="#" class="btn btn-dark rounded-pill">Login</a>
        </div>
      </div>
    </nav>

    <section class="hero py-5">
      <div class="container text-center">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <h1 class="hero-title mb-3">
              Your Trusted Place to Meet Your New Best Friend
            </h1>

            <p class="hero-subtitle mb-4">
              Carefully selected pets, ready to bring joy to your home.
            </p>

            <a href="#" class="btn btn-primary btn-hero">Get Started Now</a>
          </div>
        </div>

        <div class="row mt-6 justify-content-center align-items-center g-4">
          <div class="col-10 col-md-3">
            <div class="pet-cart bg-pink relative">
              <img
                src="assets/images/dog1.jpg"
                alt="Hero Image"
                class="img-fluid"
              />
            </div>
          </div>

          <div class="col-10 col-md-3">
            <div class="pet-cart bg-purple relative">
              <img
                src="assets/images/dog2.jpg"
                alt="Hero Image"
                class="img-fluid"
              />
            </div>
          </div>

          <div class="col-10 col-md-3">
            <div class="pet-cart bg-yellow relative">
              <img
                src="assets/images/dog3.jpg"
                alt="Hero Image"
                class="img-fluid"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
